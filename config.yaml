environment:
  name: CarRacing-v3
  n_episodes: 1000
  render_mode: human
  action_type: discrete # discrete or continous
  policy: random # random or trained

hyperparameters:
  learning_rate: 0.01      
  gamma: 0.1              

  discount_factor: 0.99 
  
  # Exploration Strategy
  epsilon: 1.0 
  exploration_decay: 0.9
  final_epsilon: 0.1